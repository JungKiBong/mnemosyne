services:
  neo4j:
    image: neo4j:5.18-community
    container_name: mirofish-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/mirofish
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - mories-net

  mirofish-api:
    build:
      context: ./src
      dockerfile: Dockerfile
    container_name: mirofish-api
    ports:
      - "5001:5000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=mirofish
      - STORAGE_BACKEND=${STORAGE_BACKEND:-neo4j}
      - SUPERMEMORY_API_KEY=${SUPERMEMORY_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - FLASK_ENV=${FLASK_ENV:-development}
    volumes:
      - ./uploads:/app/uploads
      - ./mcp_server:/mcp_server
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - mories-net

  dashboard:
    image: nginx:alpine
    container_name: mirofish-dashboard
    ports:
      - "8080:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      mirofish-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mories-net

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  mories-net:
    driver: bridge

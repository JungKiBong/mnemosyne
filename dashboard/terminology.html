<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mories — Terminology Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/dashboard/assets/css/tokens.css">
    <link rel="stylesheet" href="/dashboard/nav-component.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }

        .container { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }

        .page-header { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
        .page-header h1 { font-size: 24px; font-weight: 700; background: var(--gradient-1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .page-header p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }

        .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; font-family: 'Inter', sans-serif; }
        .btn-primary { background: var(--gradient-1); color: white; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(79,140,255,0.4); }
        .btn-danger { background: rgba(239,68,68,0.15); color: var(--accent-red); border: 1px solid rgba(239,68,68,0.3); }
        .btn-danger:hover { background: rgba(239,68,68,0.3); }
        .btn-outline { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-color); }
        .btn-outline:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .btn-sm { padding: 4px 10px; font-size: 11px; }

        .main-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .panel { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; }
        .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .panel-header h2 { font-size: 15px; font-weight: 600; }
        .panel-body { padding: 20px; }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .form-control { width: 100%; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); padding: 10px; font-family: 'Inter', sans-serif; font-size: 13px; }
        .form-control:focus { outline: none; border-color: var(--accent-blue); }

        .table-responsive { overflow-x: auto; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: left; padding: 10px 12px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border-color); }
        .data-table td { padding: 12px; font-size: 13px; border-bottom: 1px solid rgba(45,52,82,0.5); vertical-align: middle; }
        .data-table tr:hover { background: var(--bg-card-hover); }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge.personal { background: rgba(79,140,255,0.15); color: var(--accent-blue); border: 1px solid rgba(79,140,255,0.3); }
        .badge.tribal { background: rgba(139,92,246,0.15); color: var(--accent-purple); border: 1px solid rgba(139,92,246,0.3); }
        .badge.global { background: rgba(16,185,129,0.15); color: var(--accent-green); border: 1px solid rgba(16,185,129,0.3); }

        .actions-cell { display: flex; gap: 8px; }

        #migrationPreview { display: none; margin-top: 16px; padding: 16px; border-radius: 8px; background: rgba(245,158,11,0.05); border: 1px solid rgba(245,158,11,0.2); }
        .preview-list { margin-top: 8px; max-height: 200px; overflow-y: auto; font-size: 12px; color: var(--text-secondary); }
        .preview-item { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

    </style>
</head>
<body>
    <div id="mories-nav" data-active="terminology" data-status="false"></div>

    <div class="container">
        <div class="page-header">
            <div>
                <h1>Terminology Rules</h1>
                <p>Standardize entity names across scopes via term normalization mapping.</p>
            </div>
            <div>
                <input type="text" id="userIdInput" class="form-control" style="width:200px;display:inline-block;" placeholder="User ID (X-User-ID)" value="system_admin">
                <button class="btn btn-outline" onclick="loadMappings()">Refresh</button>
            </div>
        </div>

        <div class="main-grid">
            <div class="panel">
                <div class="panel-header">
                    <h2>Active Mappings</h2>
                    <select id="scopeFilter" class="form-control" style="width:auto;padding:4px 8px;font-size:12px" onchange="loadMappings()">
                        <option value="">All Scopes</option>
                        <option value="Personal">Personal</option>
                        <option value="Tribal">Tribal</option>
                        <option value="Global">Global</option>
                    </select>
                </div>
                <div class="panel-body">
                    <div class="table-responsive">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Source Term</th>
                                    <th>Standard Term</th>
                                    <th>Scope</th>
                                    <th>Created At</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="mappingsTableBody">
                                <tr>
                                    <td colspan="5" style="text-align:center;color:var(--text-muted)">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div id="migrationPreview">
                        <h3 style="font-size:14px;color:var(--accent-amber);margin-bottom:8px">Migration Preview</h3>
                        <p style="font-size:12px" id="previewMsg"></p>
                        <div class="preview-list" id="previewList"></div>
                        <div style="margin-top:12px;display:flex;gap:8px">
                            <button class="btn btn-primary btn-sm" id="btnExecuteMigration" onclick="executeMigration()">Execute Migration</button>
                            <button class="btn btn-outline btn-sm" onclick="closePreview()">Cancel</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <h2>Add / Update Mapping</h2>
                </div>
                <div class="panel-body">
                    <form id="mappingForm" onsubmit="submitMapping(event)">
                        <div class="form-group">
                            <label>Scope</label>
                            <select id="mapScope" class="form-control" required>
                                <option value="Personal">Personal</option>
                                <option value="Tribal">Tribal (Team)</option>
                                <option value="Global">Global</option>
                            </select>
                        </div>
                        <div class="form-group" id="teamIdGroup" style="display:none;">
                            <label>Team ID</label>
                            <input type="text" id="mapTeamId" class="form-control" placeholder="Required for Tribal scope">
                        </div>
                        <div class="form-group">
                            <label>Source Term</label>
                            <input type="text" id="mapSource" class="form-control" required placeholder="e.g., llm, chatgpt">
                        </div>
                        <div class="form-group">
                            <label>Standard Term</label>
                            <input type="text" id="mapStandard" class="form-control" required placeholder="e.g., Large Language Model">
                        </div>
                        <div class="form-group">
                            <label>Entity Type (Optional)</label>
                            <input type="text" id="mapEntityType" class="form-control" placeholder="e.g., Technology">
                        </div>
                        <div class="form-group">
                            <label>Description (Optional)</label>
                            <textarea id="mapDescription" class="form-control" rows="2" placeholder="Reason for this mapping"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width:100%">Save Mapping</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Include Nav Script -->
    <script src="/dashboard/nav-component.js"></script>
    <script>
        let currentPreviewUuid = null;

        document.getElementById('mapScope').addEventListener('change', function(e) {
            document.getElementById('teamIdGroup').style.display = e.target.value === 'Tribal' ? 'block' : 'none';
        });

        async function fetchAPI(url, options = {}) {
            const userId = document.getElementById('userIdInput').value || 'anonymous';
            const headers = { 'Content-Type': 'application/json', 'X-User-ID': userId };
            const res = await fetch(url, { ...options, headers: { ...headers, ...(options.headers || {}) } });
            const data = await res.json();
            if (!data.success) throw new Error(data.error || 'Unknown error');
            return data.data;
        }

        async function loadMappings() {
            const tbody = document.getElementById('mappingsTableBody');
            const filter = document.getElementById('scopeFilter').value;
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">Loading...</td></tr>';
            
            try {
                let url = '/api/terminology/';
                if (filter) url += `?scope=${filter}`;
                const data = await fetchAPI(url);
                
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">No active mappings found.</td></tr>';
                    return;
                }

                tbody.innerHTML = data.map(item => `
                    <tr>
                        <td style="font-weight:600">${escapeHtml(item.source_term)}</td>
                        <td>${escapeHtml(item.standard_term)}</td>
                        <td><span class="badge ${item.scope.toLowerCase()}">${item.scope}</span></td>
                        <td style="color:var(--text-muted);font-size:12px">${new Date(item.created_at).toLocaleDateString()}</td>
                        <td class="actions-cell">
                            <button class="btn btn-outline btn-sm" onclick="previewMigration('${item.uuid}', '${escapeHtml(item.source_term)}', '${escapeHtml(item.standard_term)}')">Preview</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteMapping('${item.uuid}')">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--accent-red)">Error: ${err.message}</td></tr>`;
            }
        }

        async function submitMapping(e) {
            e.preventDefault();
            const scope = document.getElementById('mapScope').value;
            const payload = {
                scope: scope,
                source_term: document.getElementById('mapSource').value,
                standard_term: document.getElementById('mapStandard').value,
                entity_type: document.getElementById('mapEntityType').value || null,
                description: document.getElementById('mapDescription').value || null,
                team_id: scope === 'Tribal' ? (document.getElementById('mapTeamId').value || null) : null
            };

            try {
                await fetchAPI('/api/terminology/', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                alert('Mapping saved successfully');
                e.target.reset();
                if (scope !== 'Tribal') document.getElementById('teamIdGroup').style.display = 'none';
                loadMappings();
            } catch (err) {
                alert(`Error saving mapping: ${err.message}`);
            }
        }

        async function deleteMapping(uuid) {
            if (!confirm('Are you sure you want to delete this mapping?')) return;
            try {
                await fetchAPI(`/api/terminology/${uuid}`, { method: 'DELETE' });
                loadMappings();
            } catch (err) {
                alert(`Error deleting mapping: ${err.message}`);
            }
        }

        async function previewMigration(uuid, src, dst) {
            const previewBox = document.getElementById('migrationPreview');
            const msg = document.getElementById('previewMsg');
            const list = document.getElementById('previewList');
            currentPreviewUuid = uuid;

            previewBox.style.display = 'block';
            msg.innerHTML = `Analyzing impact for replacing <strong>${src}</strong> with <strong>${dst}</strong>...`;
            list.innerHTML = '';

            try {
                const data = await fetchAPI(`/api/terminology/${uuid}/preview`);
                msg.innerHTML = `Found <strong>${data.affected_nodes}</strong> entities that can be migrated.`;
                if (data.sample_affected && data.sample_affected.length > 0) {
                    list.innerHTML = data.sample_affected.map(n => `<div class="preview-item">• ${escapeHtml(n)}</div>`).join('');
                }
            } catch (err) {
                msg.innerHTML = `<span style="color:var(--accent-red)">Error: ${err.message}</span>`;
            }
        }

        function closePreview() {
            document.getElementById('migrationPreview').style.display = 'none';
            currentPreviewUuid = null;
        }

        async function executeMigration() {
            if (!currentPreviewUuid) return;
            if (!confirm('Execute migration? This will permanently update existing entities.')) return;
            
            const btn = document.getElementById('btnExecuteMigration');
            btn.disabled = true;
            btn.textContent = 'Migrating...';

            try {
                const data = await fetchAPI(`/api/terminology/${currentPreviewUuid}/migrate`, { method: 'POST' });
                alert(`Migration complete! Affected nodes: ${data.affected_nodes}`);
                closePreview();
                loadMappings();
            } catch (err) {
                alert(`Error executing migration: ${err.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Execute Migration';
            }
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        // Init
        loadMappings();
    </script>
</body>
</html>

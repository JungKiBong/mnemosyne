server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy
    location /api/ {
        proxy_pass http://mirofish-api:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
    }

    # HTML files - no cache for dev
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Explicit route aliases for pages with mismatched paths
    location = /memory/synaptic {
        rewrite ^ /synaptic.html last;
    }
    location = /memory/history {
        rewrite ^ /memory_history.html last;
    }
    location = /workflows {
        rewrite ^ /workflows.html last;
    }
    location = /api-explorer {
        rewrite ^ /api.html last;
    }

    # Static files
    location / {
        try_files $uri $uri.html $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
